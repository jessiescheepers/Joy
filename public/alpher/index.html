<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpher</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400&family=Source+Serif+4:ital,wght@1,300&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #F0F3F5;
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }

        .state-label {
            position: fixed;
            bottom: 32px;
            left: 0; right: 0;
            text-align: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(0, 0, 0, 0.25);
            transition: opacity 0.6s ease;
            pointer-events: none;
            user-select: none;
        }
        .state-hint {
            position: fixed;
            bottom: 14px;
            left: 0; right: 0;
            text-align: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 300;
            font-size: 9px;
            letter-spacing: 0.08em;
            color: rgba(0, 0, 0, 0.15);
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

<div class="state-label" id="stateLabel">rest</div>
<div class="state-hint">keys 1–5 · tap to cycle · 0 for rest · D for depth</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js"
    }
}
</script>

<script type="module">
import * as THREE from 'three';


// ════════════════════════════════════════════════════════════
// GLSL NOISE — Simplex 3D (Ashima Arts)
// ════════════════════════════════════════════════════════════

const NOISE_GLSL = `
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x * 34.0) + 10.0) * x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
    const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
    const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
    vec3 i = floor(v + dot(v, C.yyy));
    vec3 x0 = v - i + dot(i, C.xxx);
    vec3 g = step(x0.yzx, x0.xyz);
    vec3 l = 1.0 - g;
    vec3 i1 = min(g.xyz, l.zxy);
    vec3 i2 = max(g.xyz, l.zxy);
    vec3 x1 = x0 - i1 + C.xxx;
    vec3 x2 = x0 - i2 + C.yyy;
    vec3 x3 = x0 - D.yyy;
    i = mod289(i);
    vec4 p = permute(permute(permute(
        i.z + vec4(0.0, i1.z, i2.z, 1.0))
      + i.y + vec4(0.0, i1.y, i2.y, 1.0))
      + i.x + vec4(0.0, i1.x, i2.x, 1.0));
    float n_ = 0.142857142857;
    vec3 ns = n_ * D.wyz - D.xzx;
    vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
    vec4 x_ = floor(j * ns.z);
    vec4 y_ = floor(j - 7.0 * x_);
    vec4 x = x_ * ns.x + ns.yyyy;
    vec4 y = y_ * ns.x + ns.yyyy;
    vec4 h = 1.0 - abs(x) - abs(y);
    vec4 b0 = vec4(x.xy, y.xy);
    vec4 b1 = vec4(x.zw, y.zw);
    vec4 s0 = floor(b0) * 2.0 + 1.0;
    vec4 s1 = floor(b1) * 2.0 + 1.0;
    vec4 sh = -step(h, vec4(0.0));
    vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
    vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
    vec3 p0 = vec3(a0.xy, h.x);
    vec3 p1 = vec3(a0.zw, h.y);
    vec3 p2 = vec3(a1.xy, h.z);
    vec3 p3 = vec3(a1.zw, h.w);
    vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
    p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
    vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
    m = m * m;
    return 42.0 * dot(m * m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
`;


// ════════════════════════════════════════════════════════════
// GLSL DISPLACEMENT — Form
// ════════════════════════════════════════════════════════════

const DISPLACEMENT_GLSL = `
const vec3 CONCAVE_DIR = vec3(0.2896, -0.0600, -0.9553);
const vec3 CORE_DIR = vec3(0.2425, 0.0, -0.9701);
const vec3 ANTI_MOTION = vec3(-0.9363, -0.2341, 0.2604);

float sstep(float e0, float e1, float x) {
    float t = clamp((x - e0) / (e1 - e0), 0.0, 1.0);
    return t * t * (3.0 - 2.0 * t);
}

vec3 displacePoint(vec3 position) {
    vec3 n = normalize(position);
    vec3 p = n;
    p.y *= 0.925;
    vec3 dn = normalize(p);
    // Concavity — the Kapoor recession
    float cd = dot(n, CONCAVE_DIR);
    float cm = sstep(0.25, 0.88, cd);
    float cp = cm * cm;
    p -= dn * cp * 0.22;
    // Edge looseness — murmuration quality
    float coreDot = dot(n, CORE_DIR);
    float coreDist = 1.0 - (coreDot * 0.5 + 0.5);
    float edgeLoose = sstep(0.15, 0.6, coreDist);
    // Asymmetric bulge — she leans, she reaches
    vec3 reachDir = normalize(vec3(-0.5, 0.3, -0.7));
    float reach = dot(n, reachDir) * 0.5 + 0.5;
    float asymmetry = reach * reach * 0.018;
    // Four noise frequencies
    float n1 = snoise(n * 1.2) * 0.040;
    float n2 = snoise(n * 2.5 + vec3(7.3, 3.1, 11.7)) * 0.020;
    float n3 = snoise(n * 6.0 + vec3(23.1, 17.4, 5.9)) * 0.005;
    float n4 = snoise(n * 10.0 + vec3(41.2, 29.8, 13.3)) * 0.002;
    float totalNoise = n1 * (0.4 + 0.6 * edgeLoose)
                     + n2 * (0.25 + 0.75 * edgeLoose)
                     + n3 * edgeLoose
                     + n4 * edgeLoose * edgeLoose;
    // Trailing edge
    float trailDot = dot(n, ANTI_MOTION);
    float trail = sstep(-0.2, 0.55, trailDot);
    float trailNoise = snoise(n * 7.0 + vec3(55.1, 19.8, 33.3))
                     * 0.007 * trail * edgeLoose;
    p += dn * (totalNoise + trailNoise + asymmetry);
    return p;
}

vec3 displacePointClean(vec3 position) {
    vec3 n = normalize(position);
    vec3 p = n;
    p.y *= 0.925;
    vec3 dn = normalize(p);
    float cd = dot(n, CONCAVE_DIR);
    float cm = sstep(0.25, 0.88, cd);
    float cp = cm * cm;
    p -= dn * cp * 0.22;
    return p;
}

vec3 computeDisplacedNormal(vec3 position) {
    vec3 n = normalize(position);
    vec3 up = abs(n.y) < 0.99 ? vec3(0.0, 1.0, 0.0) : vec3(1.0, 0.0, 0.0);
    vec3 t1 = normalize(cross(up, n));
    vec3 t2 = normalize(cross(n, t1));
    float eps = 0.005;
    vec3 c0 = displacePointClean(position);
    vec3 c1 = displacePointClean(position + t1 * eps);
    vec3 c2 = displacePointClean(position + t2 * eps);
    vec3 cleanN = normalize(cross(c1 - c0, c2 - c0));
    vec3 d0 = displacePoint(position);
    vec3 d1 = displacePoint(position + t1 * eps);
    vec3 d2 = displacePoint(position + t2 * eps);
    vec3 fullN = normalize(cross(d1 - d0, d2 - d0));
    return normalize(mix(cleanN, fullN, 0.22));
}
`;


// ════════════════════════════════════════════════════════════
// ENERGY STATES — Sea. Earth. Sky.
// Thin-film interference. Colour from depth, not paint.
// The cosmology IS the physics.
// ════════════════════════════════════════════════════════════

const ENERGY_STATES = {
    rest: {
        name: 'rest',
        // Between sea and earth. The shoreline at dusk.
        iridescence: 0.4,
        ior: 1.35,
        thickness: [140, 280],
        exposure: 0.88,
        color: [0.62, 0.66, 0.72],
        bg: [0.94, 0.95, 0.96],
    },
    depleted: {
        name: 'depleted',
        // THE DEEP SEA. Not grey. Never grey.
        // Rich, ancient, blue. Unmistakably the sea.
        iridescence: 0.65,
        ior: 1.35,
        thickness: [100, 250],
        exposure: 0.80,
        color: [0.46, 0.52, 0.66],
        bg: [0.92, 0.93, 0.96],
    },
    flat: {
        name: 'flat',
        // SHALLOW WATER. Teal, aquamarine, first hint of green.
        iridescence: 0.55,
        ior: 1.35,
        thickness: [170, 310],
        exposure: 0.86,
        color: [0.52, 0.60, 0.66],
        bg: [0.93, 0.95, 0.96],
    },
    steady: {
        name: 'steady',
        // THE EARTH. Moss on stone. Bark after rain.
        iridescence: 0.65,
        ior: 1.38,
        thickness: [260, 420],
        exposure: 0.92,
        color: [0.68, 0.67, 0.60],
        bg: [0.96, 0.95, 0.94],
    },
    sharp: {
        name: 'sharp',
        // THE TREELINE. Golden hour. Amber through leaves.
        iridescence: 0.85,
        ior: 1.42,
        thickness: [340, 550],
        exposure: 1.02,
        color: [0.78, 0.72, 0.62],
        bg: [0.97, 0.96, 0.94],
    },
    full: {
        name: 'full',
        // ABOVE THE CANOPY. Sky. Open light. Corona.
        iridescence: 1.0,
        ior: 1.45,
        thickness: [400, 650],
        exposure: 1.1,
        color: [0.82, 0.78, 0.72],
        bg: [0.98, 0.97, 0.95],
    },
};

const STATE_ORDER = ['rest', 'depleted', 'flat', 'steady', 'sharp', 'full'];
const STATE_KEYS = { '0': 'rest', '1': 'depleted', '2': 'flat', '3': 'steady', '4': 'sharp', '5': 'full' };

let interactionDepth = 0.5;


// ════════════════════════════════════════════════════════════
// RENDERER + SCENE
// ════════════════════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({
    antialias: true,
    alpha: false,
    powerPreference: 'high-performance'
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0.94, 0.95, 0.96);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6.6);
camera.lookAt(0, 0, 0);


// ════════════════════════════════════════════════════════════
// ENVIRONMENT MAP — Static. Proven. The one that works.
// ════════════════════════════════════════════════════════════

function createEnvironment(renderer) {
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();
    const envGeo = new THREE.SphereGeometry(10, 64, 32);
    const envMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        uniforms: {},
        vertexShader: `
            varying vec3 vWorldDir;
            void main() {
                vWorldDir = normalize(position);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            varying vec3 vWorldDir;
            void main() {
                vec3 dir = normalize(vWorldDir);
                float y = dir.y * 0.5 + 0.5;

                vec3 sky = vec3(0.95, 0.92, 0.88);
                vec3 mid = vec3(0.44, 0.44, 0.46);
                vec3 ground = vec3(0.06, 0.06, 0.075);

                vec3 color = mix(ground, mid, smoothstep(0.05, 0.35, y));
                color = mix(color, sky, smoothstep(0.32, 0.92, y));

                color += dir.x * -0.02;

                vec3 winDir = normalize(vec3(-0.4, 0.75, 0.2));
                float winDot = max(0.0, dot(dir, winDir));
                color += pow(winDot, 4.0) * vec3(0.40, 0.38, 0.33);
                color += pow(winDot, 16.0) * vec3(0.35, 0.32, 0.26);

                gl_FragColor = vec4(color, 1.0);
            }
        `
    });

    envScene.add(new THREE.Mesh(envGeo, envMat));
    const envMap = pmremGenerator.fromScene(envScene, 0, 0.1, 100).texture;
    pmremGenerator.dispose();
    envGeo.dispose();
    envMat.dispose();
    return envMap;
}

scene.environment = createEnvironment(renderer);


// ════════════════════════════════════════════════════════════
// GEOMETRY + MATERIAL
// ════════════════════════════════════════════════════════════

const geometry = new THREE.IcosahedronGeometry(1, 7);

const restState = ENERGY_STATES.rest;

const material = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(...restState.color),
    metalness: 1.0,
    roughness: 0.06,
    envMapIntensity: 1.6,
    iridescence: restState.iridescence,
    iridescenceIOR: restState.ior,
    iridescenceThicknessRange: restState.thickness,
});

material.onBeforeCompile = (shader) => {
    shader.vertexShader = shader.vertexShader.replace(
        '#include <common>',
        NOISE_GLSL + '\n' + DISPLACEMENT_GLSL + '\n#include <common>\n'
    );
    shader.vertexShader = shader.vertexShader.replace(
        '#include <beginnormal_vertex>',
        `vec3 objectNormal = computeDisplacedNormal(position);`
    );
    shader.vertexShader = shader.vertexShader.replace(
        '#include <begin_vertex>',
        `vec3 transformed = displacePoint(position);`
    );
};

const mesh = new THREE.Mesh(geometry, material);
mesh.position.set(-0.06, -0.08, 0);
mesh.rotation.set(0.07, -0.04, 0.09);
scene.add(mesh);


// ════════════════════════════════════════════════════════════
// LIGHTING
// ════════════════════════════════════════════════════════════

const mainLight = new THREE.DirectionalLight(0xFFF4E8, 1.8);
mainLight.position.set(-3, 4.5, 2.5);
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0xE0E4EA, 0.08);
fillLight.position.set(3, -1.5, 2);
scene.add(fillLight);


// ════════════════════════════════════════════════════════════
// STATE TRANSITIONS
// ════════════════════════════════════════════════════════════

const label = document.getElementById('stateLabel');

let anim = {
    iridescence: restState.iridescence,
    ior: restState.ior,
    thicknessMin: restState.thickness[0],
    thicknessMax: restState.thickness[1],
    exposure: restState.exposure,
    colorR: restState.color[0],
    colorG: restState.color[1],
    colorB: restState.color[2],
    bgR: restState.bg[0],
    bgG: restState.bg[1],
    bgB: restState.bg[2],
};

let target = { ...anim };
let transitionSpeed = 1.2;

function lerp(a, b, t) { return a + (b - a) * t; }

function setEnergyState(stateName) {
    const state = ENERGY_STATES[stateName];
    if (!state) return;

    const depthFactor = 0.3 + 0.7 * interactionDepth;

    target.iridescence = state.iridescence * depthFactor;
    target.ior = state.ior;
    target.thicknessMin = state.thickness[0];
    target.thicknessMax = state.thickness[1];
    target.exposure = state.exposure;
    target.colorR = state.color[0];
    target.colorG = state.color[1];
    target.colorB = state.color[2];
    target.bgR = state.bg[0];
    target.bgG = state.bg[1];
    target.bgB = state.bg[2];

    label.textContent = state.name;
}

setEnergyState('rest');

let currentStateIndex = 0;


// ════════════════════════════════════════════════════════════
// INPUT
// ════════════════════════════════════════════════════════════

window.addEventListener('keydown', (e) => {
    if (STATE_KEYS[e.key]) {
        currentStateIndex = STATE_ORDER.indexOf(STATE_KEYS[e.key]);
        setEnergyState(STATE_KEYS[e.key]);
    }
    if (e.key === 'd' || e.key === 'D') {
        if (interactionDepth < 0.3) interactionDepth = 0.5;
        else if (interactionDepth < 0.8) interactionDepth = 1.0;
        else interactionDepth = 0.15;
        setEnergyState(STATE_ORDER[currentStateIndex]);
    }
});

renderer.domElement.addEventListener('click', () => {
    currentStateIndex = (currentStateIndex + 1) % STATE_ORDER.length;
    setEnergyState(STATE_ORDER[currentStateIndex]);
});


// ════════════════════════════════════════════════════════════
// ANIMATION LOOP
// ════════════════════════════════════════════════════════════

const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    const lerpFactor = 1.0 - Math.pow(0.001, dt / transitionSpeed);

    anim.iridescence = lerp(anim.iridescence, target.iridescence, lerpFactor);
    anim.ior = lerp(anim.ior, target.ior, lerpFactor);
    anim.thicknessMin = lerp(anim.thicknessMin, target.thicknessMin, lerpFactor);
    anim.thicknessMax = lerp(anim.thicknessMax, target.thicknessMax, lerpFactor);
    anim.exposure = lerp(anim.exposure, target.exposure, lerpFactor);
    anim.colorR = lerp(anim.colorR, target.colorR, lerpFactor);
    anim.colorG = lerp(anim.colorG, target.colorG, lerpFactor);
    anim.colorB = lerp(anim.colorB, target.colorB, lerpFactor);
    anim.bgR = lerp(anim.bgR, target.bgR, lerpFactor);
    anim.bgG = lerp(anim.bgG, target.bgG, lerpFactor);
    anim.bgB = lerp(anim.bgB, target.bgB, lerpFactor);

    material.iridescence = anim.iridescence;
    material.iridescenceIOR = anim.ior;
    material.iridescenceThicknessRange = [anim.thicknessMin, anim.thicknessMax];
    material.color.setRGB(anim.colorR, anim.colorG, anim.colorB);
    renderer.toneMappingExposure = anim.exposure;

    scene.background.setRGB(anim.bgR, anim.bgG, anim.bgB);

    renderer.render(scene, camera);
}

animate();


// ════════════════════════════════════════════════════════════
// RESIZE
// ════════════════════════════════════════════════════════════

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
});

</script>
</body>
</html>
